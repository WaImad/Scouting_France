name: Actualisation Hebdomadaire Scout Data France

# Déclencheur : Tous les lundis à 03h00 UTC, ou manuellement via le bouton "Run workflow"
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch: 

jobs:
  scraping_job:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Installer les packages R
        run: |
          install.packages(c("rvest", "httr", "stringr", "jsonlite", "dplyr", "googlesheets4"))
        shell: Rscript {0}

      - name: Lancer le scraping
        # C'est ici qu'on donne l'autorisation d'utiliser le coffre-fort
        run: Rscript scraping.R

      - name: Sauvegarder le nouveau fichier CSV sur GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add DFCO_Base_Hebdo_Automatique.csv
          git commit -m "Mise à jour hebdo automatique" || echo "Pas de changement"
          git push
